services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: scraper
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  scraper:
    build:
      context: ./best_scrape_v1
      dockerfile: Dockerfile
    image: best-scraper
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./best_scrape_v1/.env
    environment:
      DISPLAY: ":99"
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: scraper
      PGUSER: postgres
      PGPASSWORD: example
    command: >
      bash -c "rm -f /tmp/.X99-lock /tmp/.X11-unix/X99;
      Xvfb :99 -screen 0 1280x800x24 -nolisten tcp &>/tmp/xvfb.log &
      sleep 1;
      export DISPLAY=:99;
      uvicorn api:app --host 0.0.0.0 --port 8000 --workers 10"
    depends_on:
      db:
        condition: service_healthy
